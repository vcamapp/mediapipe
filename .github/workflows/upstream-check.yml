name: Upstream check
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - id: check
        continue-on-error: true
        run: |
          set +e
          ./scripts/upstream-check.sh
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0
      - if: steps.check.outputs.exit_code == '10'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$(gh issue list --state open --search 'in:title MediaPipeTasksVision upstream update available' --json number --jq 'length')" -eq 0 ]; then
            gh issue create --title "MediaPipeTasksVision upstream update available" --body "The CocoaPods upstream version is newer than the bundled version. Run scripts/upstream-check.sh and update the pinned artifact after reviewing headers, symbols, and both architectures."
          fi
      - if: steps.check.outputs.exit_code != '0' && steps.check.outputs.exit_code != '10'
        run: exit 1
