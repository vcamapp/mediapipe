name: Release
on:
  push:
    tags:
      - "*"
jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          ruby-version: '3.3'
          bundler-cache: true
      - uses: maxim-lobanov/setup-xcode@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          xcode-version: '26.6'
      - run: test "$GITHUB_REF_NAME" = "$(sed -n 's/^PACKAGE_VERSION="\(.*\)"/\1/p' config/versions.env)"
        if: startsWith(github.ref, 'refs/tags/')
      - run: '! gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY"'
        if: startsWith(github.ref, 'refs/tags/')
      - run: make all
        if: startsWith(github.ref, 'refs/tags/')
      - run: test "$(sed -n 's/.*checksum: "\([0-9a-f]*\)".*/\1/p' Package.swift)" = "$(head -1 .build-artifacts/checksums.txt)"
        if: startsWith(github.ref, 'refs/tags/')
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          body_path: .build-artifacts/release-notes.md
          files: |
            .build-artifacts/MediaPipeTasksVision.xcframework.zip
            .build-artifacts/metadata/build-metadata.json
            .build-artifacts/THIRD_PARTY_NOTICES.txt
          fail_on_unmatched_files: true
